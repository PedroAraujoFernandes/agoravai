<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="arquivo.css">
    <title>calculadora imc</title>
</head>
<body>
    <h1 class="logo">calculadora imc</h1>

    <div class="bloco" id="bloco">
        <h2>calculadora imc</h2>

        <label for="altura">altura</label>
        <input id="altura" type="number">
        
        <label for="peso">peso</label>
        <input id="peso" type="number">

        <button id="botao">botão</button>

        <p id="resultado">resultado</p>

        <table>
            <caption>
                tabela imc
            </caption>
            <thead>
                <tr>
                <th>imc</th>
                <th>classificações</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                </tr>
                <tr>
                    <td>Menor do que 18,5</td>
                    <td>Abaixo do peso normal</td>
                </tr>
                <tr>
                    <td>18,5 - 24,9</td>
                    <td>Peso normal</td>
                </tr>
                <tr>
                    <td>25,0 - 29,9</td>
                    <td>Excesso de peso</td>
                </tr>
                <tr>
                    <td>30.0 - 34,9</td>
                    <td>Obesidade lcasse 1</td>
                </tr>
                <tr>
                    <td>35,0 - 39,9</td>
                    <td>obesidade classe 2</td>
                </tr>
                <tr>
                    <td>Maior ou igual a 40,0</td>
                    <td>Obesidade classe 3</td>
                </tr>
            </tbody>
        </table>

    </div>

    <script src="arquivo.js"></script>
</body>
</html>
